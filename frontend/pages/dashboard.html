<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManage - Dashboard</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fas fa-users"></i>                
                <span>Student Manager</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-user-graduate"></i>
                    <span>Etudiants</span>
                </a>
                <a href="dashboard.html" class="nav-item active">
                    <i class="fas fa-gauge-high"></i>
                    <span>Dashboard</span>
                </a>
            </nav>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <h1>Tableau de bord analytique</h1>
                <div class="header-actions">
                    <button id="refreshDashboardBtn" class="btn-icon"><i class="fas fa-sync-alt"></i></button>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Cartes KPI -->
                <div class="stat-card"><i class="fas fa-user-graduate"></i><div><h3>Étudiants actifs</h3><p id="totalActive">0</p></div></div>
                <div class="stat-card"><i class="fas fa-archive"></i><div><h3>Archivés</h3><p id="totalArchived">0</p></div></div>
                <div class="stat-card"><i class="fas fa-database"></i><div><h3>PostgreSQL</h3><p id="totalPG">0</p></div></div>
                <div class="stat-card"><i class="fas fa-code"></i><div><h3>JSON (non importés)</h3><p id="totalJSON">0</p></div></div>
                <div class="stat-card"><i class="fas fa-check-circle"></i><div><h3>Validés</h3><p id="totalValid">0</p></div></div>
                <div class="stat-card"><i class="fas fa-times-circle"></i><div><h3>Non validés</h3><p id="totalInvalid">0</p></div></div>

                <!-- Graphiques -->
                <div class="chart-card"><canvas id="classChart"></canvas><p>Répartition par classe</p></div>
                <div class="chart-card"><canvas id="sourceChart"></canvas><p>Source des données</p></div>
                <div class="chart-card"><canvas id="validityChart"></canvas><p>Validité des dossiers</p></div>
            </div>
        </main>
    </div>
    <script src="../js/dashboard.js"></script>
</body>
</html>
